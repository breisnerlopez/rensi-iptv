name: Build iOS

# Trigger reduced to workflow_dispatch only — every push was failing in
# the codesign step because this fork doesn't carry the signing
# certificate. Re-add the push / pull_request triggers once codesign is
# wired up through repo secrets.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate files
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install iOS dependencies
        run: cd ios && pod install

      - name: Build iOS
        run: flutter build ios --no-codesign

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/
