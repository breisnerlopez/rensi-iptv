  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libasound2-dev libpulse-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libunwind-dev libmpv-dev mpv libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavfilter-dev libavdevice-dev libswresample-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Generate files
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build Linux
        run: flutter build linux
      - name: Create Linux Archive
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../rensi-iptv-linux-${{ github.ref_name }}.zip .
      - name: Upload Linux Release Asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: rensi-iptv-linux-${{ github.ref_name }}.zip
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Generate files
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        run: flutter build apk --build-name=releaseUnsigned
      - name: Rename APK to standard format
        run: cp build/app/outputs/flutter-apk/app-release.apk rensi-iptv-android-${{ github.ref_name }}.apk
      - name: Upload Android Asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: rensi-iptv-android-${{ github.ref_name }}.apk
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Generate files
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Install CocoaPods
        run: sudo gem install cocoapods
      - name: Install iOS dependencies
        run: cd ios && pod install
      - name: Build iOS
        run: flutter build ios --no-codesign
      - name: Create iOS Archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../rensi-iptv-ios-${{ github.ref_name }}.zip .
      - name: Upload iOS Release Asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: rensi-iptv-ios-${{ github.ref_name }}.zip
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
