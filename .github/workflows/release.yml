name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Rensi IPTV ${{ github.ref_name }}
          body: |
            ## 🎉 Rensi IPTV ${{ github.ref_name }}

            Free & open-source IPTV streaming for Windows, macOS, Linux,
            Android and iOS.

            ### 📥 Downloads
            Pick the build for your platform below.

            ### 🔧 Installation
            - **Windows**: run the `rensi-iptv-windows-setup-${{ github.ref_name }}.exe` installer, or grab the portable zip
            - **Linux**: extract the zip and run `iptv_player`
            - **Android**: install the APK
            - **iOS**: requires a developer account to install (no codesign in CI)

            ---
            Rensi IPTV is a fork of [bsogulcan/another-iptv-player](https://github.com/bsogulcan/another-iptv-player) — see the repository LICENSE for the dual copyright notice.
          draft: false
          prerelease: false
          generateReleaseNotes: false
          makeLatest: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Generate files
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build Windows
        run: flutter build windows
      - name: Install NSIS
        run: choco install nsis -y
      - name: Create Windows Installer
        shell: pwsh
        run: |
          cd windows
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (!(Test-Path $makensis)) {
            throw "makensis not found at $makensis"
          }
          & $makensis installer.nsi

          if (Test-Path "rensi-iptv-windows-setup.exe") {
            Move-Item "rensi-iptv-windows-setup.exe" "..\rensi-iptv-windows-setup-${{ github.ref_name }}.exe"
          } else {
            throw "Installer file not found!"
          }
      - name: Create Windows Installer ZIP
        run: |
          7z a rensi-iptv-windows-setup-${{ github.ref_name }}.zip rensi-iptv-windows-setup-${{ github.ref_name }}.exe
      - name: Create Windows Archive (Portable)
        run: |
          cd build/windows/x64/runner/Release
          7z a ../../../../../rensi-iptv-windows-${{ github.ref_name }}.zip .
      - name: Upload Windows Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: |
            rensi-iptv-windows-setup-${{ github.ref_name }}.zip
            rensi-iptv-windows-${{ github.ref_name }}.zip
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

